<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Judge Console</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Provable 80/20 sBTC Pool Core</p>
        <h1>Judge Console</h1>
        <p class="lead">
          A judge-facing console for demonstrating correctness, witness data, safety, proof claims, and live readonly evidence.
        </p>
      </header>

      <section class="controls">
        <div class="control-grid">
          <label>
            <span>Vector</span>
            <select id="vector-id">
              <option value="">Manual inputs</option>
            </select>
          </label>
          <label>
            <span>Dataset</span>
            <select id="dataset-id">
              <option value="mock">mock-sbtc (artifact)</option>
              <option value="sbtc">official sbtc-token (requirement)</option>
            </select>
          </label>
          <label>
            <span>Manual Direction</span>
            <select id="manual-direction">
              <option value="sbtc-in">sbtc-in</option>
              <option value="quote-in">quote-in</option>
            </select>
          </label>
          <label>
            <span>API URL</span>
            <input id="api-url" value="http://127.0.0.1:3999" />
          </label>
          <label>
            <span>Contract Principal</span>
            <input id="contract-principal" placeholder="ST...pool-80-20" />
          </label>
          <label>
            <span>Sender Address</span>
            <input id="sender-address" placeholder="ST..." />
          </label>
          <label>
            <span>Manual Amount In</span>
            <input id="quote-amount" value="1000" />
          </label>
        </div>

        <div class="actions">
          <button id="load-artifact" type="button">Load Artifact Bundle</button>
          <button id="load-live" type="button">Load Live Readonly</button>
          <span class="source-badge" id="source-badge">Source: artifact bundle</span>
        </div>
      </section>

      <section class="grid" id="panels"></section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
