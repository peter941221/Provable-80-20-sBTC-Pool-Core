<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Invariant reduction: weighted 80/20 -> integer x^4 * y = K">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <style>
      .title { font: 700 24px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #fff; text-transform: uppercase; letter-spacing: 0.1em; }
      .sub { font: 400 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #a1a1aa; }
      .mono { font: 700 28px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #14b8a6; }
      .mono2 { font: 700 28px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #facc15; }
      .box { fill: rgba(24, 24, 27, 0.8); stroke: #27272a; stroke-width: 1.5; rx: 4; }
      .arrow { stroke: #14b8a6; stroke-width: 2; fill: none; stroke-dasharray: 4; }
      .label-bg { fill: #09090b; stroke: #14b8a6; stroke-width: 1; rx: 2; }
    </style>
  </defs>

  <rect width="1200" height="360" fill="#09090b" />
  <rect width="1200" height="360" fill="url(#grid)" />
  
  <path d="M 64 115 L 1136 115" stroke="#27272a" stroke-width="1" stroke-dasharray="8 8" />

  <text x="64" y="60" class="title">Invariant Reduction Strategy</text>
  <text x="64" y="90" class="sub">> converting fractional powers to deterministic integer math</text>

  <!-- Left Box -->
  <rect x="64" y="150" width="440" height="160" class="box" />
  <text x="84" y="185" class="sub">[ INPUT: WEIGHTED FORM ]</text>
  <text x="84" y="235" class="mono">x^(4/5) * y^(1/5) = k</text>
  <text x="84" y="275" class="sub">// non-deterministic / complex to prove</text>

  <!-- Connection -->
  <path d="M 504 230 L 696 230" class="arrow" />
  <rect x="555" y="215" width="90" height="30" class="label-bg" />
  <text x="600" y="235" class="sub" text-anchor="middle">REDUCE</text>
  <polygon points="696,230 684,224 684,236" fill="#14b8a6" />

  <!-- Right Box -->
  <rect x="696" y="150" width="440" height="160" class="box" />
  <text x="716" y="185" class="sub">[ OUTPUT: INTEGER FORM ]</text>
  <text x="716" y="235" class="mono2">x^4 * y = K</text>
  <text x="716" y="275" class="sub">// bounded: lower &lt;= ideal &lt;= upper</text>
</svg>
