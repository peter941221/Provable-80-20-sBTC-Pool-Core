<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Invariant reduction: weighted 80/20 -> integer x^4 * y = K">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020" />
      <stop offset="1" stop-color="#111b35" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <style>
      .title { font: 700 28px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #edf2ff; }
      .sub { font: 500 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #a9b4d0; }
      .mono { font: 700 26px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #76d7ea; }
      .mono2 { font: 700 26px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #ffcf6e; }
      .box { fill: rgba(20, 28, 51, 0.92); stroke: #273250; stroke-width: 2; rx: 18; }
      .arrow { stroke: #76d7ea; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)" />

  <text x="64" y="68" class="title">Fixed 80/20 Weighted AMM -> Integer Invariant</text>
  <text x="64" y="102" class="sub">Make swaps, witnesses, and proofs bounded and inspectable under integer math.</text>

  <g filter="url(#softShadow)">
    <rect x="64" y="140" width="440" height="160" class="box" />
    <text x="96" y="190" class="sub">80/20 weighted invariant</text>
    <text x="96" y="236" class="mono">x^(4/5) * y^(1/5) = k</text>
    <text x="96" y="272" class="sub">hard to implement/prove generally</text>
  </g>

  <path d="M 520 220 C 600 220, 600 220, 680 220" class="arrow" />
  <polygon points="680,220 664,210 664,230" fill="#76d7ea" />
  <text x="548" y="200" class="sub">reduce</text>

  <g filter="url(#softShadow)">
    <rect x="696" y="140" width="440" height="160" class="box" />
    <text x="728" y="190" class="sub">integer form (fixed pool)</text>
    <text x="728" y="236" class="mono2">x^4 * y = K</text>
    <text x="728" y="272" class="sub">supports explicit bounds: lower <= ideal <= upper</text>
  </g>
</svg>

