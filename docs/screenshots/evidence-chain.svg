<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Evidence chain: claim to contract, tests, artifacts, console, and proofs">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020" />
      <stop offset="1" stop-color="#111b35" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <style>
      .title { font: 700 28px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #edf2ff; }
      .sub { font: 500 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #a9b4d0; }
      .nodeTitle { font: 700 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #edf2ff; }
      .nodeBody { font: 500 14px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #a9b4d0; }
      .box { fill: rgba(20, 28, 51, 0.92); stroke: #273250; stroke-width: 2; rx: 18; }
      .arrow { stroke: #76d7ea; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="url(#bg2)" />

  <text x="64" y="68" class="title">Judge-Facing Evidence Chain</text>
  <text x="64" y="102" class="sub">Every claim should be traceable in one click: contract surface, tests, artifacts, console, and proofs.</text>

  <g filter="url(#shadow)">
    <rect x="64" y="150" width="250" height="120" class="box" />
    <text x="92" y="188" class="nodeTitle">Claim</text>
    <text x="92" y="214" class="nodeBody">CL-01 ... CL-07</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="150" width="250" height="120" class="box" />
    <text x="368" y="188" class="nodeTitle">Contract</text>
    <text x="368" y="214" class="nodeBody">pool-80-20.clar</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="616" y="150" width="250" height="120" class="box" />
    <text x="644" y="188" class="nodeTitle">Tests</text>
    <text x="644" y="214" class="nodeBody">unit / differential</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="892" y="150" width="250" height="120" class="box" />
    <text x="920" y="188" class="nodeTitle">Artifacts</text>
    <text x="920" y="214" class="nodeBody">claim-matrix.json</text>
    <text x="920" y="236" class="nodeBody">vector-pack.json</text>
  </g>

  <path d="M 314 210 C 328 210, 328 210, 340 210" class="arrow" />
  <polygon points="340,210 324,200 324,220" fill="#76d7ea" />

  <path d="M 590 210 C 604 210, 604 210, 616 210" class="arrow" />
  <polygon points="616,210 600,200 600,220" fill="#76d7ea" />

  <path d="M 866 210 C 880 210, 880 210, 892 210" class="arrow" />
  <polygon points="892,210 876,200 876,220" fill="#76d7ea" />

  <g filter="url(#shadow)">
    <rect x="140" y="300" width="420" height="92" class="box" />
    <text x="168" y="336" class="nodeTitle">Judge Console</text>
    <text x="168" y="360" class="nodeBody">frontend/judge-console/</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="300" width="420" height="92" class="box" />
    <text x="668" y="336" class="nodeTitle">Lean Proof Slices</text>
    <text x="668" y="360" class="nodeBody">proof/ + artifacts/proof-status.json</text>
  </g>

  <path d="M 465 270 C 465 290, 350 290, 350 300" class="arrow" />
  <polygon points="350,300 340,284 360,284" fill="#76d7ea" />

  <path d="M 1017 270 C 1017 290, 850 290, 850 300" class="arrow" />
  <polygon points="850,300 840,284 860,284" fill="#76d7ea" />
</svg>

