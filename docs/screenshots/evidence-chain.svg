<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Evidence chain: claim to contract, tests, artifacts, console, and proofs">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <style>
      .title { font: 700 24px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #fff; text-transform: uppercase; letter-spacing: 0.1em; }
      .sub { font: 400 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #a1a1aa; }
      .nodeTitle { font: 700 16px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #fff; text-transform: uppercase; }
      .nodeBody { font: 400 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #d4d4d8; }
      .box { fill: rgba(24, 24, 27, 0.8); stroke: #27272a; stroke-width: 1.5; rx: 4; }
      .arrow { stroke: #14b8a6; stroke-width: 2; fill: none; stroke-dasharray: 4; }
      .point { fill: #14b8a6; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="#09090b" />
  <rect width="1200" height="420" fill="url(#grid)" />
  
  <path d="M 64 115 L 1136 115" stroke="#27272a" stroke-width="1" stroke-dasharray="8 8" />

  <text x="64" y="60" class="title">Judge-Facing Evidence Chain</text>
  <text x="64" y="90" class="sub">> end-to-end traceability from claim to proof</text>

  <!-- Nodes -->
  <g>
    <rect x="64" y="150" width="250" height="120" class="box" />
    <text x="84" y="188" class="nodeTitle">[ CLAIM ]</text>
    <text x="84" y="220" class="nodeBody">CL-01 ... CL-07</text>
    <text x="84" y="242" class="nodeBody">// business logic goal</text>
  </g>

  <g>
    <rect x="340" y="150" width="250" height="120" class="box" />
    <text x="360" y="188" class="nodeTitle">[ CONTRACT ]</text>
    <text x="360" y="220" class="nodeBody">pool-80-20.clar</text>
    <text x="360" y="242" class="nodeBody">// clarity implementation</text>
  </g>

  <g>
    <rect x="616" y="150" width="250" height="120" class="box" />
    <text x="636" y="188" class="nodeTitle">[ TESTS ]</text>
    <text x="636" y="220" class="nodeBody">unit / differential</text>
    <text x="636" y="242" class="nodeBody">// empirical validation</text>
  </g>

  <g>
    <rect x="892" y="150" width="250" height="120" class="box" />
    <text x="912" y="188" class="nodeTitle">[ ARTIFACTS ]</text>
    <text x="912" y="214" class="nodeBody">claim-matrix.json</text>
    <text x="912" y="234" class="nodeBody">vector-pack.json</text>
    <text x="912" y="254" class="nodeBody">// replayable evidence</text>
  </g>

  <!-- Connectors -->
  <path d="M 314 210 L 340 210" class="arrow" />
  <circle cx="314" cy="210" r="3" class="point" />
  
  <path d="M 590 210 L 616 210" class="arrow" />
  <circle cx="590" cy="210" r="3" class="point" />
  
  <path d="M 866 210 L 892 210" class="arrow" />
  <circle cx="866" cy="210" r="3" class="point" />

  <!-- Secondary Nodes -->
  <g>
    <rect x="140" y="300" width="420" height="92" class="box" />
    <text x="160" y="336" class="nodeTitle">[[ JUDGE CONSOLE ]]</text>
    <text x="160" y="364" class="nodeBody">> browser-side interactive exploration</text>
  </g>

  <g>
    <rect x="640" y="300" width="420" height="92" class="box" />
    <text x="660" y="336" class="nodeTitle">[[ LEAN PROOF SLICES ]]</text>
    <text x="660" y="364" class="nodeBody">> formal mathematical verification</text>
  </g>

  <!-- Vertical Links -->
  <path d="M 465 270 L 465 285 L 350 285 L 350 300" class="arrow" />
  <path d="M 1017 270 L 1017 285 L 850 285 L 850 300" class="arrow" />
</svg>
